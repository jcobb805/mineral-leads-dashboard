<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mineral Leads Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4a9eff 0%, #2a7fcf 100%);
            border-radius: 8px;
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 2px 8px rgba(74, 158, 255, 0.3);
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #4a9eff;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4a9eff;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: #4a9eff;
            border-bottom-color: #4a9eff;
        }

        .tab-btn:hover {
            color: #6bb3ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box, .filter-select {
            padding: 10px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-box:focus, .filter-select:focus {
            outline: none;
            border-color: #4a9eff;
            background: #222;
        }

        /* Grid View */
        .table-wrapper {
            overflow-x: auto;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #252525;
            position: sticky;
            top: 0;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #4a9eff;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        th:hover {
            background: #2a2a2a;
        }

        td {
            padding: 12px;
            border-top: 1px solid #2a2a2a;
        }

        tr:hover {
            background: #242424;
        }

        .owner-name {
            font-weight: 600;
            color: #fff;
        }

        .stage-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .stage-initial {
            background: #1e3a8a;
            color: #60a5fa;
        }

        .stage-dead {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .stage-negotiating {
            background: #744210;
            color: #fed7aa;
        }

        .stage-unknown {
            background: #3a3a3a;
            color: #a0a0a0;
        }

        /* Kanban */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            min-height: 600px;
        }

        .kanban-column {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .kanban-header {
            font-weight: 600;
            color: #4a9eff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .kanban-count {
            display: inline-block;
            background: #4a9eff;
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }

        .kanban-cards {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .kanban-card {
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            padding: 12px;
            cursor: grab;
            transition: all 0.2s;
        }

        .kanban-card:hover {
            border-color: #4a9eff;
            transform: translateY(-2px);
        }

        .kanban-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .kanban-meta {
            font-size: 12px;
            color: #888;
            margin: 4px 0;
        }

        .kanban-nma {
            font-size: 12px;
            color: #4a9eff;
            font-weight: 600;
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            position: relative;
            height: 300px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #4a9eff;
            margin-bottom: 15px;
        }

        /* Calendar */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .calendar-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            border-left: 3px solid #4a9eff;
        }

        .calendar-date {
            font-weight: 600;
            color: #4a9eff;
            margin-bottom: 8px;
        }

        .calendar-name {
            color: #fff;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .calendar-meta {
            font-size: 12px;
            color: #888;
        }

        /* Overdue */
        .overdue {
            border-left-color: #ef4444 !important;
        }

        .overdue .calendar-date {
            color: #ef4444 !important;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .header-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .tabs {
                flex-wrap: wrap;
            }

            .kanban-board {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }

            .controls {
                flex-direction: column;
            }

            .search-box, .filter-select {
                width: 100%;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .notes-btn {
            background: #1a3a52;
            color: #4a9eff;
            border: 1px solid #4a9eff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .notes-btn:hover {
            background: #1e4a62;
            color: #6bb3ff;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid #4a9eff;
            border-radius: 8px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            color: #4a9eff;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .modal-textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            background: #252525;
            border: 1px solid #333;
            color: #e0e0e0;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }

        .modal-textarea:focus {
            outline: none;
            border-color: #4a9eff;
            background: #2a2a2a;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .modal-btn-save {
            background: #4a9eff;
            color: #000;
        }

        .modal-btn-save:hover {
            background: #6bb3ff;
        }

        .modal-btn-cancel {
            background: #333;
            color: #e0e0e0;
        }

        .modal-btn-cancel:hover {
            background: #444;
        }

        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #4a9eff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Mineral Leads Dashboard</h1>
            <div class="header-stats">
                <div class="stat-card">
                    <div class="stat-label">Total Leads</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total NMA</div>
                    <div class="stat-value" id="stat-nma">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Initial Outreach</div>
                    <div class="stat-value" id="stat-initial">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Overdue Follow-Ups</div>
                    <div class="stat-value" id="stat-overdue">0</div>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('grid')">📋 Grid</button>
            <button class="tab-btn" onclick="switchTab('kanban')">📌 Kanban</button>
            <button class="tab-btn" onclick="switchTab('calendar')">📅 Follow-Ups</button>
            <button class="tab-btn" onclick="switchTab('analytics')">📊 Analytics</button>
        </div>

        <!-- Grid View -->
        <div id="grid" class="tab-content active">
            <div class="controls">
                <input type="text" class="search-box" id="searchBox" placeholder="Search by name or county..." onkeyup="filterGrid()">
            </div>
            <div class="table-wrapper">
                <table id="leadsTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable('Owner Name')">Owner Name</th>
                            <th onclick="sortTable('County Interest Held')">County</th>
                            <th onclick="sortTable('NMA')">NMA</th>
                            <th onclick="sortTable('Owner City')">City</th>
                            <th onclick="sortTable('Owner Phone')">Phone</th>
                            <th onclick="sortTable('Description')">Description</th>
                            <th>My Notes</th>
                        </tr>
                    </thead>
                    <tbody id="gridBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Kanban View -->
        <div id="kanban" class="tab-content">
            <div class="kanban-board" id="kanbanBoard">
            </div>
        </div>

        <!-- Calendar View -->
        <div id="calendar" class="tab-content">
            <div class="controls">
                <select class="filter-select" id="countryFilter" onchange="filterCalendar()">
                    <option value="">All Counties</option>
                </select>
            </div>
            <div class="calendar-grid" id="calendarGrid">
            </div>
        </div>

        <!-- Analytics -->
        <div id="analytics" class="tab-content">
            <div class="charts-grid">
                <div class="chart-container">
                    <div class="chart-title">Leads by Deal Stage</div>
                    <canvas id="stageChart"></canvas>
                </div>
                <div class="chart-container">
                    <div class="chart-title">NMA Distribution by County</div>
                    <canvas id="countyChart"></canvas>
                </div>
                <div class="chart-container">
                    <div class="chart-title">Top Counties by NMA</div>
                    <canvas id="topCountiesChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Notes Modal -->
    <div id="notesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">📝 Notes for <span id="notesOwnerName"></span></div>
            <textarea id="notesTextarea" class="modal-textarea" placeholder="Add your personal notes here. These are only saved in your browser and won't sync to the Google Sheet."></textarea>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeNotesModal()">Cancel</button>
                <button class="modal-btn modal-btn-save" onclick="saveNotes()">Save Notes</button>
            </div>
            <input type="hidden" id="notesOwnerID">
        </div>
    </div>

    <script>
        let allLeads = [];
        let filteredLeads = [];
        let currentSort = { column: 'Owner Name', ascending: true };
        const SHEET_ID = '1XMUs-qCWV_cgP86J7l9xIXI8MHSB3HFajIsH8-3UEp8';
        const SHEET_NAME = 'Grants Title Review';
        const API_KEY = 'AIzaSyB1lb2tzx0J55ekT_CGC-xAxgS-oJNqU7E'; // Get this from Google Cloud Console

        async function loadData() {
            // Check if API key is set
            if (API_KEY === 'YOUR_API_KEY_HERE') {
                console.log('API key not configured, using embedded CSV data');
                loadEmbeddedData();
                return;
            }

            try {
                // Load from Google Sheets
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}`);
                if (response.ok) {
                    const data = await response.json();
                    parseGoogleSheetData(data.values);
                    console.log('Data loaded from Google Sheets');
                    return;
                } else {
                    console.error('Google Sheets API error:', response.status);
                }
            } catch (e) {
                console.error('Error loading from Google Sheets:', e);
            }

            // Fallback: use embedded data
            console.log('Falling back to embedded CSV data');
            loadEmbeddedData();
        }

        function parseGoogleSheetData(values) {
            if (!values || values.length < 2) return;

            const headers = values[0];
            allLeads = values.slice(1).map(row => {
                let obj = {};
                headers.forEach((header, i) => {
                    obj[header] = row[i] || '';
                });
                return obj;
            }).filter(lead => lead['Owner Name']);

            initializeDashboard();
        }

        async function loadEmbeddedData() {
            const csvUrl = 'data.csv';
            try {
                const response = await fetch(csvUrl);
                const text = await response.text();
                Papa.parse(text, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        allLeads = results.data.filter(row => row['Owner Name']);
                        initializeDashboard();
                    },
                    error: (error) => {
                        console.error('Error parsing CSV:', error);
                        document.body.innerHTML = '<div class="container" style="padding-top: 100px;"><h2>⚠️ Error Loading Data</h2><p>Please add data.csv file to the dashboard directory or configure Google Sheets integration.</p></div>';
                    }
                });
            } catch (e) {
                console.error('Error loading embedded data:', e);
            }
        }

        function initializeDashboard() {
            filteredLeads = [...allLeads];
            updateStats();
            renderGrid();
            renderKanban();
            renderCalendar();
            renderAnalytics();
            populateCountyFilter();
        }

        function updateStats() {
            const today = new Date();
            const totalNMA = allLeads.reduce((sum, lead) => sum + (parseFloat(lead.NMA) || 0), 0);
            const initialCount = allLeads.filter(l => l['Deal Stage'] === 'Initial Outreach').length;
            const overdueCount = allLeads.filter(lead => {
                if (!lead['Next Follow-Up Date']) return false;
                const followUpDate = new Date(lead['Next Follow-Up Date']);
                return followUpDate < today;
            }).length;

            document.getElementById('stat-total').textContent = allLeads.length.toLocaleString();
            document.getElementById('stat-nma').textContent = totalNMA.toFixed(1).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            document.getElementById('stat-initial').textContent = initialCount.toLocaleString();
            document.getElementById('stat-overdue').textContent = overdueCount.toLocaleString();
        }

        function renderGrid() {
            const tbody = document.getElementById('gridBody');
            tbody.innerHTML = '';

            if (filteredLeads.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#666;padding:40px;">No leads match your filters</td></tr>';
                return;
            }

            filteredLeads.forEach(lead => {
                const row = document.createElement('tr');
                const ownerID = lead['Owner ID'] || lead['Owner Name'];
                const localNotes = getLocalNotes(ownerID);

                row.innerHTML = `
                    <td class="owner-name">${lead['Owner Name'] || '—'}</td>
                    <td>${lead['County Interest Held'] || lead['County'] || '—'}</td>
                    <td>${parseFloat(lead['NMA'] || 0).toFixed(2)}</td>
                    <td>${lead['Owner City'] || '—'}</td>
                    <td>${lead['Owner Phone'] ? lead['Owner Phone'].split('\n')[0] : '—'}</td>
                    <td>${lead['Description'] || '—'}</td>
                    <td><button class="notes-btn" onclick="editNotes('${ownerID.replace(/'/g, "\\'")}', '${(lead['Owner Name'] || '').replace(/'/g, "\\'")}')">${localNotes ? '📝 ' + localNotes.substring(0, 20) + (localNotes.length > 20 ? '...' : '') : '+ Add Note'}</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderKanban() {
            const board = document.getElementById('kanbanBoard');
            const stages = ['Ready for Outreach', 'Initial Outreach', 'Negotiating', 'Dead / Lost', 'No', 'Unknown'];

            board.innerHTML = '';

            stages.forEach(stage => {
                const stageLeads = allLeads.filter(l => l['Deal Stage'] === stage || (stage === 'Unknown' && !l['Deal Stage']));
                const totalNMA = stageLeads.reduce((sum, l) => sum + (parseFloat(l.NMA) || 0), 0);

                const column = document.createElement('div');
                column.className = 'kanban-column';

                let html = `<div class="kanban-header">${stage}<span class="kanban-count">${stageLeads.length}</span></div><div class="kanban-cards">`;

                stageLeads.forEach(lead => {
                    html += `
                        <div class="kanban-card">
                            <div class="kanban-name">${lead['Owner Name']}</div>
                            <div class="kanban-meta">${lead['County Interest Held']}</div>
                            <div class="kanban-nma">${parseFloat(lead.NMA || 0).toFixed(2)} NMA</div>
                            <div class="kanban-meta">${lead['Last Contact Date'] ? `Last: ${lead['Last Contact Date']}` : 'Never contacted'}</div>
                        </div>
                    `;
                });

                html += `</div>`;
                column.innerHTML = html;
                board.appendChild(column);
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            let leadsWithFollowUp = allLeads.filter(l => l['Next Follow-Up Date']);
            leadsWithFollowUp.sort((a, b) => new Date(a['Next Follow-Up Date']) - new Date(b['Next Follow-Up Date']));

            if (leadsWithFollowUp.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No scheduled follow-ups</p></div>';
                return;
            }

            const today = new Date();
            grid.innerHTML = '';

            leadsWithFollowUp.forEach(lead => {
                const followUpDate = new Date(lead['Next Follow-Up Date']);
                const isOverdue = followUpDate < today;
                const daysUntil = Math.ceil((followUpDate - today) / (1000 * 60 * 60 * 24));

                const item = document.createElement('div');
                item.className = `calendar-item ${isOverdue ? 'overdue' : ''}`;
                item.innerHTML = `
                    <div class="calendar-date">${lead['Next Follow-Up Date']} ${isOverdue ? '🔴 OVERDUE' : ''}</div>
                    <div class="calendar-name">${lead['Owner Name']}</div>
                    <div class="calendar-meta">${lead['County Interest Held']}</div>
                    <div class="calendar-meta">${lead['Owner Phone'] ? lead['Owner Phone'].split('\n')[0] : 'No phone'}</div>
                    ${lead['Follow-Up Notes'] ? `<div class="calendar-meta" style="margin-top:8px;color:#4a9eff;">📝 ${lead['Follow-Up Notes']}</div>` : ''}
                `;
                grid.appendChild(item);
            });
        }

        function renderAnalytics() {
            // Stage Chart
            const stages = {};
            allLeads.forEach(lead => {
                const stage = lead['Deal Stage'] || 'Unknown';
                stages[stage] = (stages[stage] || 0) + 1;
            });

            new Chart(document.getElementById('stageChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(stages),
                    datasets: [{
                        data: Object.values(stages),
                        backgroundColor: ['#60a5fa', '#fca5a5', '#fed7aa', '#a0a0a0'],
                        borderColor: '#1a1a1a',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#e0e0e0', font: { size: 12 } }
                        }
                    }
                }
            });

            // County Chart (top 10)
            const counties = {};
            allLeads.forEach(lead => {
                const county = lead['County Interest Held'] || 'Unknown';
                counties[county] = (counties[county] || 0) + parseFloat(lead.NMA || 0);
            });

            const topCounties = Object.entries(counties)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            new Chart(document.getElementById('topCountiesChart'), {
                type: 'bar',
                data: {
                    labels: topCounties.map(c => c[0]),
                    datasets: [{
                        label: 'NMA',
                        data: topCounties.map(c => c[1]),
                        backgroundColor: '#4a9eff',
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { color: '#333' },
                            ticks: { color: '#888' }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });

            // County Distribution
            new Chart(document.getElementById('countyChart'), {
                type: 'pie',
                data: {
                    labels: topCounties.map(c => c[0]),
                    datasets: [{
                        data: topCounties.map(c => c[1]),
                        backgroundColor: [
                            '#60a5fa', '#34d399', '#fbbf24', '#f87171', '#a78bfa',
                            '#14b8a6', '#f97316', '#6366f1', '#ec4899', '#06b6d4'
                        ],
                        borderColor: '#1a1a1a',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#e0e0e0', font: { size: 11 } }
                        }
                    }
                }
            });
        }

        function populateCountyFilter() {
            const counties = [...new Set(allLeads.map(l => l['County Interest Held']).filter(Boolean))].sort();
            const select = document.getElementById('countryFilter');
            counties.forEach(county => {
                const option = document.createElement('option');
                option.value = county;
                option.textContent = county;
                select.appendChild(option);
            });
        }

        function filterGrid() {
            const search = document.getElementById('searchBox').value.toLowerCase();

            filteredLeads = allLeads.filter(lead => {
                const matchSearch = !search ||
                    (lead['Owner Name'] && lead['Owner Name'].toLowerCase().includes(search)) ||
                    (lead['County Interest Held'] && lead['County Interest Held'].toLowerCase().includes(search)) ||
                    (lead['County'] && lead['County'].toLowerCase().includes(search));
                return matchSearch;
            });

            renderGrid();
        }

        function filterCalendar() {
            renderCalendar();
        }

        function sortTable(column) {
            if (currentSort.column === column) {
                currentSort.ascending = !currentSort.ascending;
            } else {
                currentSort.column = column;
                currentSort.ascending = true;
            }

            filteredLeads.sort((a, b) => {
                let aVal = a[column];
                let bVal = b[column];

                if (column === 'NMA') {
                    aVal = parseFloat(aVal) || 0;
                    bVal = parseFloat(bVal) || 0;
                } else {
                    aVal = (aVal || '').toString().toLowerCase();
                    bVal = (bVal || '').toString().toLowerCase();
                }

                if (aVal < bVal) return currentSort.ascending ? -1 : 1;
                if (aVal > bVal) return currentSort.ascending ? 1 : -1;
                return 0;
            });

            renderGrid();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Local notes management (localStorage)
        function getLocalNotes(ownerID) {
            const notes = localStorage.getItem(`notes_${ownerID}`);
            return notes ? notes : '';
        }

        function saveLocalNotes(ownerID, notes) {
            if (notes.trim()) {
                localStorage.setItem(`notes_${ownerID}`, notes);
            } else {
                localStorage.removeItem(`notes_${ownerID}`);
            }
        }

        function editNotes(ownerID, ownerName) {
            const currentNotes = getLocalNotes(ownerID);
            const modal = document.getElementById('notesModal');
            document.getElementById('notesOwnerName').textContent = ownerName;
            document.getElementById('notesTextarea').value = currentNotes;
            document.getElementById('notesOwnerID').value = ownerID;
            modal.classList.add('show');
            document.getElementById('notesTextarea').focus();
        }

        function closeNotesModal() {
            document.getElementById('notesModal').classList.remove('show');
        }

        function saveNotes() {
            const ownerID = document.getElementById('notesOwnerID').value;
            const notes = document.getElementById('notesTextarea').value;
            saveLocalNotes(ownerID, notes);
            closeNotesModal();
            renderGrid(); // Refresh to show updated notes
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('notesModal');
            if (event.target == modal) {
                closeNotesModal();
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
